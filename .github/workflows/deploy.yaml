name: Mule CI/CD (Exchange + CloudHub 2.0)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      CONNECTED_APP_CLIENTID: ${{ secrets.CONNECTED_APP_CLIENTID }}
      CONNECTED_APP_CLIENTSECRET: ${{ secrets.CONNECTED_APP_CLIENTSECRET }}

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # 3. Cache Maven (faster builds)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      # 4. Build Project using custom settings
      - name: Build with Maven
        run: mvn clean package -DskipTests -s .maven/settings.xml
   
          
      # 5. Publish to Exchange
      - name: Publish to Anypoint Exchange
        run: |
          mvn deploy \
          -DskipTests \
          -DmuleDeploy=false \
          -s .maven/settings.xml
          
      # 6. Deploy to CloudHub 2.0
      - name: Deploy to CloudHub 2.0
        run: |
          mvn deploy \
          -DmuleDeploy \
          -s .maven/settings.xml \
          -DENV=${{ secrets.ENV }} 
